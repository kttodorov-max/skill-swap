<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swap Requests – SkillSwap</title>
  </head>
  <body>
    <div id="navbar"></div>
    <main class="container py-5">
      <h1 class="h3 mb-4"><i class="bi bi-arrow-left-right text-primary"></i> Swap Requests</h1>

      <ul class="nav nav-tabs mb-4" id="swap-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="incoming-tab" data-bs-toggle="tab" data-bs-target="#incoming" type="button">
            <i class="bi bi-inbox me-1"></i>Received
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="outgoing-tab" data-bs-toggle="tab" data-bs-target="#outgoing" type="button">
            <i class="bi bi-send me-1"></i>Sent
          </button>
        </li>
      </ul>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="incoming" role="tabpanel">
          <div id="incoming-list"></div>
        </div>
        <div class="tab-pane fade" id="outgoing" role="tabpanel">
          <div id="outgoing-list"></div>
        </div>
      </div>
    </main>
    <script type="module" src="/js/pages/swap-requests.js"></script>
  </body>
</html>
