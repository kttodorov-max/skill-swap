<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация – SkillSwap</title>
  </head>
  <body>
    <div id="navbar"></div>
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h3 mb-4 text-center">
                <i class="bi bi-person-plus text-primary"></i> Регистрация
              </h1>
              <form id="register-form">
                <div class="mb-3">
                  <label for="username" class="form-label">Потребителско име</label>
                  <input type="text" class="form-control" id="username" required />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Имейл</label>
                  <input type="email" class="form-control" id="email" required />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Парола</label>
                  <input type="password" class="form-control" id="password" minlength="6" required />
                </div>
                <button type="submit" class="btn btn-primary w-100">Регистрирай се</button>
              </form>
              <p class="text-center mt-3 mb-0 small text-muted">
                Вече имаш акаунт? <a href="login.html">Влез</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/js/pages/register.js"></script>
  </body>
</html>
