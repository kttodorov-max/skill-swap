<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Details – SkillSwap</title>
  </head>
  <body>
    <div id="navbar"></div>
    <main class="container py-5">
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Home</a></li>
          <li class="breadcrumb-item active" aria-current="page" id="breadcrumb-title">Skill</li>
        </ol>
      </nav>

      <div id="skill-detail-content">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="swapModal" tabindex="-1" aria-labelledby="swapModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title h5" id="swapModalLabel">
              <i class="bi bi-arrow-left-right me-1"></i>Propose Swap
            </h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="swap-form">
            <div class="modal-body">
              <p class="text-muted small" id="swap-target-info"></p>
              <div class="mb-3">
                <label for="offered-skill" class="form-label">My skill (offering)</label>
                <select class="form-select" id="offered-skill" required></select>
              </div>
              <div class="mb-3">
                <label for="swap-message" class="form-label">Message (optional)</label>
                <textarea class="form-control" id="swap-message" rows="3" placeholder="Short message..."></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary" id="swap-submit-btn">
                <i class="bi bi-send me-1"></i>Send Request
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script type="module" src="/js/pages/skill-detail.js"></script>
  </body>
</html>
