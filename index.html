<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillSwap – Обмен на умения</title>
  </head>
  <body>
    <div id="navbar"></div>
    <main>
      <section class="hero-section py-5">
        <div class="container text-center">
          <h1 class="display-5 fw-bold mb-3">
            <i class="bi bi-lightning-charge-fill text-primary"></i>
            SkillSwap
          </h1>
          <p class="lead text-muted mb-4">
            Платформа за обмен на умения – преподавай това, което знаеш, и научи нещо ново.
          </p>
          <div id="hero-actions" class="d-flex flex-wrap gap-2 justify-content-center">
            <a href="register.html" class="btn btn-primary btn-lg">
              <i class="bi bi-person-plus me-1"></i> Започни сега
            </a>
            <a href="skill-form.html" class="btn btn-outline-primary btn-lg">
              <i class="bi bi-plus-circle me-1"></i> Добави умение
            </a>
          </div>
        </div>
      </section>

      <section class="container py-4">
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <h2 class="h5 mb-3"><i class="bi bi-funnel me-2"></i>Филтри</h2>
            <div class="row g-3">
              <div class="col-md-4">
                <label for="filter-search" class="form-label">Търсене</label>
                <input type="search" class="form-control" id="filter-search" placeholder="Заглавие на умение..." />
              </div>
              <div class="col-md-4">
                <label for="filter-type" class="form-label">Тип</label>
                <select class="form-select" id="filter-type">
                  <option value="">Всички</option>
                  <option value="teach">Преподавам</option>
                  <option value="learn">Търся да науча</option>
                </select>
              </div>
              <div class="col-md-4">
                <label for="filter-category" class="form-label">Категория</label>
                <select class="form-select" id="filter-category">
                  <option value="">Всички категории</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <h2 class="h4 mb-4"><i class="bi bi-grid me-2"></i>Умения</h2>
        <div id="skills-list" class="row g-4"></div>
      </section>
    </main>

    <div class="modal fade" id="swapModal" tabindex="-1" aria-labelledby="swapModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title h5" id="swapModalLabel">
              <i class="bi bi-arrow-left-right me-1"></i>Предложи обмен
            </h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Затвори"></button>
          </div>
          <form id="swap-form">
            <div class="modal-body">
              <p class="text-muted small" id="swap-target-info"></p>
              <div class="mb-3">
                <label for="offered-skill" class="form-label">Моето умение (предлагам)</label>
                <select class="form-select" id="offered-skill" required></select>
              </div>
              <div class="mb-3">
                <label for="swap-message" class="form-label">Съобщение (по желание)</label>
                <textarea class="form-control" id="swap-message" rows="3" placeholder="Кратко съобщение..."></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отказ</button>
              <button type="submit" class="btn btn-primary" id="swap-submit-btn">
                <i class="bi bi-send me-1"></i>Изпрати заявка
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <footer class="bg-light border-top py-4 mt-auto">
      <div class="container text-center text-muted small">
        &copy; 2026 SkillSwap – SoftUni Capstone Project
      </div>
    </footer>
    <script type="module" src="/js/pages/home.js"></script>
  </body>
</html>
