<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход – SkillSwap</title>
  </head>
  <body>
    <div id="navbar"></div>
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h3 mb-4 text-center">
                <i class="bi bi-box-arrow-in-right text-primary"></i> Вход
              </h1>
              <div id="form-alert"></div>
              <form id="login-form" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Имейл</label>
                  <input type="email" class="form-control" id="email" autocomplete="email" required />
                  <div class="invalid-feedback">Въведете валиден имейл.</div>
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Парола</label>
                  <input type="password" class="form-control" id="password" autocomplete="current-password" minlength="6" required />
                  <div class="invalid-feedback">Паролата трябва да е поне 6 символа.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="login-btn">
                  <i class="bi bi-box-arrow-in-right me-1"></i>Влез
                </button>
              </form>
              <p class="text-center mt-3 mb-0 small text-muted">
                Нямаш акаунт? <a href="register.html">Регистрирай се</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/js/pages/login.js"></script>
  </body>
</html>
